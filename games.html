<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Jogos Digitais</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d0d0d;
            color: #5a4a3f;
            font-family: Arial, sans-serif;
        }
        .cabecalho {
            font-family: Monaco;
            background-image: url('imagens/cabecalho.jpg'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position:center;
            color: white;
            height:150px;
            width:100%;
            text-align: center;
            padding: 20px;
            font-size: 20px;
        }
        .cabecalho strong{
            font-size:50px;
            font-family:times new roman;
            font-style:italic;
        }
        .container {
            display: flex;
        }
        .esquerda {
            margin: 60px;
            color: white;
            font-family: Courier;
            font-size:18px;
            font-style:;
            text-align: center;
            width: 30%;
            background: #1a1a1d;
            color:#f1dac4;
            padding: 5px;
            border-radius: 50px;
        }
        .esquerda button {
            font-family: Courier;
            background: #00c2cb;
            width:80%;
            height:14%;
            padding: 10px;
            border: none;
            border-radius: 15px;
            display: block;
            margin-top: 10px;
            margin-left:50px;
            color:black; 
            cursor: pointer;
        }
        .principal {
            width: 80%;
            padding: 20px;
            border-radius:10px;
            text-align: center;
        }
        .principal h3{
            margin-left:-580px;
            font-family:courier;
            font-size:35px;
            color:wheat;
        }
        .principal P{

            margin:20px;
            color:white;
            margin-left:-550px;
            font-family:times new roman;
            font-size:25;
        }
        .principal img {
            margin-left:-580px;
            height: 310px;
            width: 35%;
            background: #f5f5f5;
            padding: 3px;
            border-radius: 10px;
            opacity: 0.7;
        }
        p {
            text-align: center;
            color: white;
            margin-top: 20px;
        }
        .rodape {
            font-family: "Times New Roman";
            font-size: 20px;
            text-align: center;
            background: #1a1a1a;
            color: white;
            padding: 15px;
            margin-top:450px;
        }
    </style>
</head>

<body>

    <div class="cabecalho">
        <strong>Jogos Digitais</strong>
    </div>

    <div class="container">
        <div class="esquerda">
            <strong>Menu</strong><br>

            <button>Notícias</button>
            <button>Lançamentos</button>
            <button>Consoles</button>
            <button>Outros Blogs</button>
            <button>Sobre</button>
        </div>

        <div class="principal">
            <h3>Fortnite</h3>
            <img src="imagens/fortnite.webp" alt="Fortnite">
            <p>Fortnite é um jogo <strong>Battle Royale</strong> que foi lançado em <strong>2016</strong> pela empresa <strong>Epic Games</strong>. <br>
            Em dois anos o jogo faturou mais de <strong>9,16 Bilhões</strong> de dólares em dois anos que foi lançado.</p>
        
        </div>
    </div>

    <div class="rodape">
        <strong>Jogos Digitais</strong> |
        <strong>Email: Jogosdigitais@gmail.com</strong> |
        <strong>Telefone: 51 2526-2145</strong>
